<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen</title>

    <style>
      body {
        background: #1d1340;
        color: #cbbdff;
      }

      .layout {
        display: grid;
        grid-template-columns: 240px 1fr;
        grid-template-rows: auto 1fr auto;
        grid-template-areas:
          'header header'
          'sidebar main'
          'footer footer';
        min-height: 100vh;
        gap: 8px;
      }

      .header,
      .main,
      .sidebar,
      .footer {
        border: 1px solid #6e53cf;
        padding: 8px;
      }

      .header {
        grid-area: header;
        padding: 24px;
      }

      .main {
        grid-area: main;
      }

      .sidebar {
        grid-area: sidebar;
      }

      .footer {
        grid-area: footer;
        padding: 24px;
      }

      .card {
        padding: 36px;
        border: 1px solid #6e53cf;
        border-radius: 6px;
        background: #261c4d;
        cursor: pointer;
        transition:
          transform 300ms ease,
          background 300ms ease;
      }

      .card:hover {
        transform: translateY(-4px);
        background: #2c2159;
      }

      .cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      @media (min-width: 768px) {
        .cards {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (min-width: 1200px) {
        .cards {
          grid-template-columns: 1fr 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <header class="header">Header</header>

      <aside class="sidebar">
        <ul>
          <li>Dashboard</li>
          <li>Projects</li>
          <li>Settings</li>
        </ul>
      </aside>

      <main class="main">
        <div class="cards">
          <div class="card">1</div>
          <div class="card">2</div>
          <div class="card">3</div>
          <div class="card">4</div>
          <div class="card">5</div>
          <div class="card">6</div>
        </div>
      </main>

      <footer class="footer">Footer</footer>
    </div>
  </body>
</html>
